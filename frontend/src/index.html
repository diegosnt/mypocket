<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MyPocket — Seguimiento de egresos e ingresos personales" />
  <title>MyPocket</title>
  <link rel="stylesheet" href="css/style.css" />
  <script>
    const _t = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', _t);
  </script>
</head>
<body>

<!-- ─── Auth View ─────────────────────────────────── -->
<section id="view-auth">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="15" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/>
          <line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
        MyPocket
      </div>

      <div class="auth-tabs" role="tablist">
        <button class="btn-theme-toggle btn-icon" aria-label="Cambiar tema" style="margin-left:auto;"></button>
      </div>

      <!-- Formulario de ingreso -->
      <form id="form-login" novalidate>
        <p id="error-login" class="alert-error" hidden></p>
        <div class="form-group">
          <label for="login-email">Correo electrónico</label>
          <input id="login-email" name="email" type="email" autocomplete="email" placeholder="vos@ejemplo.com" required />
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary">Ingresar</button>
      </form>
    </div>
  </div>
</section>

<!-- ─── Dashboard View ────────────────────────────── -->
<section id="view-dashboard" hidden>
  <div class="dashboard">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="15" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/>
          <line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
        MyPocket
      </div>
      <div class="topbar-right">
        <span id="user-name"></span>
        <select id="currency-select" aria-label="Moneda" title="Moneda">
          <option value="USD">USD $</option>
          <option value="ARS">ARS $</option>
        </select>
        <button class="btn-theme-toggle btn-icon" aria-label="Cambiar tema"></button>
        <button id="btn-logout" class="btn btn-secondary" style="padding:.45rem .9rem;font-size:.875rem;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Salir
        </button>
      </div>
    </header>

    <!-- Contenido principal -->
    <main class="dashboard-body">

      <!-- Tarjetas de resumen -->
      <div class="summary-cards">
        <div class="summary-card">
          <p>Ingresos del mes</p>
          <strong id="total-income" class="amount--income">$0.00</strong>
        </div>
        <div class="summary-card">
          <p>Egresos del mes</p>
          <strong id="total-expenses" class="amount--expense">$0.00</strong>
        </div>
        <div class="summary-card">
          <p>Balance</p>
          <strong id="total-balance">$0.00</strong>
        </div>
      </div>

      <!-- Barra de herramientas -->
      <div class="toolbar">
        <h2>Movimientos</h2>
        <select id="filter-type" aria-label="Filtrar por tipo">
          <option value="">Todos</option>
          <option value="expense">Egresos</option>
          <option value="income">Ingresos</option>
        </select>
        <select id="filter-category" aria-label="Filtrar por categoría">
          <option value="">Todas las categorías</option>
        </select>
        <button id="btn-add-expense" class="btn btn-primary" style="width:auto;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Nuevo
        </button>
      </div>

      <!-- Panel de carga / edición -->
      <div id="expense-form-panel" class="form-panel" hidden>
        <h3 id="form-title">Nuevo movimiento</h3>
        <p id="error-expense" class="alert-error" hidden></p>
        <form id="form-expense" novalidate>
          <div class="type-toggle" role="group" aria-label="Tipo de movimiento">
            <button type="button" class="type-btn active" data-type="expense">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Egreso
            </button>
            <button type="button" class="type-btn" data-type="income">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Ingreso
            </button>
          </div>
          <input type="hidden" id="tx-type" name="type" value="expense" />
          <div class="form-grid">
            <div class="form-group">
              <label for="exp-description">Descripción</label>
              <input id="exp-description" name="description" type="text" placeholder="Café, Alquiler…" required />
            </div>
            <div class="form-group">
              <label for="exp-amount">Monto</label>
              <input id="exp-amount" name="amount" type="number" step="0.01" min="0.01" placeholder="0.00" required />
            </div>
            <div class="form-group">
              <label for="exp-category">Categoría</label>
              <select id="exp-category" name="category" class="category-select" required></select>
            </div>
            <div class="form-group">
              <label for="exp-date">Fecha</label>
              <input id="exp-date" name="date" type="date" required />
            </div>
          </div>
          <div class="form-actions">
            <button type="button" id="btn-cancel" class="btn btn-secondary">Cancelar</button>
            <button type="submit" class="btn btn-primary" style="width:auto;padding:.65rem 1.5rem;">Guardar</button>
          </div>
        </form>
      </div>

      <!-- Lista de movimientos -->
      <div class="expenses-panel">
        <div id="expense-list"></div>
      </div>

      <!-- Gráfico -->
      <aside class="chart-panel">
        <h3>
          Egresos por categoría —
          <input id="filter-month" type="month" style="border:none;background:none;font-size:.85rem;color:var(--color-text-muted);cursor:pointer;" />
        </h3>
        <canvas id="expense-chart"></canvas>
      </aside>

    </main>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script type="module">
  import { initAuth, showAuth, showDashboard } from './js/auth.js';
  import { initDashboard } from './js/dashboard.js';
  import { initTheme } from './js/theme.js';

  initTheme();

  const storedUser = localStorage.getItem('user');

  if (storedUser && localStorage.getItem('token')) {
    showDashboard();
    initDashboard(JSON.parse(storedUser));
  } else {
    showAuth();
  }

  initAuth((user) => {
    showDashboard();
    initDashboard(user);
  });

  const now = new Date();
  document.getElementById('filter-month').value =
    `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
</script>
</body>
</html>
