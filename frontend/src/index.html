<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MyPocket — Seguimiento de egresos e ingresos personales" />
  <title>MyPocket</title>
  <link rel="stylesheet" href="css/style.css" />
  <script>
    const _t = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', _t);
  </script>
</head>
<body>

<!-- ─── Auth View ─────────────────────────────────── -->
<section id="view-auth">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="15" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/>
          <line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
        MyPocket
      </div>

      <div class="auth-tabs" role="tablist">
        <button class="btn-theme-toggle btn-icon" aria-label="Cambiar tema" style="margin-left:auto;"></button>
      </div>

      <!-- Formulario de ingreso -->
      <form id="form-login" novalidate>
        <p id="error-login" class="alert-error" hidden></p>
        <div class="form-group">
          <label for="login-email">Correo electrónico</label>
          <input id="login-email" name="email" type="email" autocomplete="email" placeholder="vos@ejemplo.com" required />
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary">Ingresar</button>
      </form>
    </div>
  </div>
</section>

<!-- ─── Dashboard View ────────────────────────────── -->
<section id="view-dashboard" hidden>
  <div class="dashboard">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="15" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/>
          <line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
        MyPocket
      </div>
      <div class="topbar-right">
        <span id="user-name"></span>
        <button class="btn-theme-toggle btn-icon" aria-label="Cambiar tema"></button>
        <button id="btn-logout" class="btn btn-secondary" style="padding:.45rem .9rem;font-size:.875rem;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Salir
        </button>
      </div>
    </header>

    <!-- Contenido principal -->
    <main class="dashboard-body">

      <!-- Tarjetas de resumen -->
      <div class="summary-cards">
        <div class="summary-card">
          <p>Ingresos del mes</p>
          <strong id="total-income" class="amount--income">$0.00</strong>
        </div>
        <div class="summary-card">
          <p>Egresos del mes</p>
          <strong id="total-expenses" class="amount--expense">$0.00</strong>
        </div>
        <div class="summary-card">
          <p>Balance</p>
          <strong id="total-balance">$0.00</strong>
        </div>
      </div>

      <div id="tc-debt-summary" class="tc-debt-summary" hidden></div>

      <!-- Barra de herramientas -->
      <div class="toolbar">
        <h2>Movimientos</h2>
        <select id="currency-select" aria-label="Moneda">
          <option value="USD">USD $</option>
          <option value="ARS">ARS $</option>
        </select>
        <select id="filter-type" aria-label="Filtrar por tipo">
          <option value="">Todos</option>
          <option value="expense">Egresos</option>
          <option value="income">Ingresos</option>
        </select>
        <select id="filter-category" aria-label="Filtrar por categoría">
          <option value="">Todas las categorías</option>
        </select>
        <button id="btn-categories" class="btn btn-secondary" style="width:auto;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
          </svg>
          Categorías
        </button>
        <button id="btn-origins" class="btn btn-secondary" style="width:auto;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
          Orígenes
        </button>
        <button id="btn-credit-cards" class="btn btn-secondary" style="width:auto;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
            <line x1="6" y1="15" x2="10" y2="15"/>
          </svg>
          Tarjetas
        </button>
        <button id="btn-chart" class="btn btn-secondary" style="width:auto;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 21H4a1 1 0 0 1-1-1V3"/><path d="M7 14l4-4 4 4 4-4"/>
          </svg>
          Gráfico
        </button>
        <button id="btn-add-expense" class="btn btn-primary" style="width:auto;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Nuevo
        </button>
      </div>

      <!-- Lista de movimientos -->
      <div class="expenses-panel">
        <div id="expense-list"></div>
      </div>

    </main>
  </div>
</section>

<!-- Modal gráfico -->
<div id="chart-modal" class="modal-overlay" hidden>
  <div class="modal-card">
    <div class="modal-header">
      <h3>Egresos por categoría</h3>
      <div class="modal-header-right">
        <input id="filter-month" type="month" class="month-input" />
        <button id="btn-close-chart" class="btn-icon" aria-label="Cerrar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <canvas id="expense-chart"></canvas>
  </div>
</div>

<!-- Modal: nuevo/editar movimiento -->
<div id="expense-modal" class="modal-overlay" hidden>
  <div class="modal-card modal-card--wide">
    <div class="modal-header">
      <h3 id="form-title">Nuevo movimiento</h3>
      <button class="btn-icon" id="btn-cancel" aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <p id="error-expense" class="alert-error" hidden></p>
    <form id="form-expense" novalidate>
      <div class="type-toggle" role="group" aria-label="Tipo de movimiento">
        <button type="button" class="type-btn active" data-type="expense">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Egreso
        </button>
        <button type="button" class="type-btn" data-type="income">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Ingreso
        </button>
      </div>
      <input type="hidden" id="tx-type" name="type" value="expense" />
      <div class="form-grid">
        <div class="form-group">
          <label for="exp-description">Descripción</label>
          <input id="exp-description" name="description" type="text" placeholder="Café, Alquiler…" required />
        </div>
        <div class="form-group">
          <label for="exp-amount">Monto</label>
          <input id="exp-amount" name="amount" type="number" step="0.01" min="0.01" placeholder="0.00" required />
        </div>
        <div class="form-group">
          <label for="exp-category">Categoría</label>
          <select id="exp-category" name="category" class="category-select" required></select>
        </div>
        <div class="form-group">
          <label for="exp-payment">Medio de pago</label>
          <select id="exp-payment" name="payment" required></select>
        </div>
        <div class="form-group">
          <label for="exp-date">Fecha</label>
          <input id="exp-date" name="date" type="date" required />
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" style="width:auto;padding:.65rem 1.5rem;">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: tarjetas de crédito -->
<div id="credit-cards-modal" class="modal-overlay" hidden>
  <div class="modal-card">
    <div class="modal-header">
      <h3>Tarjetas de crédito</h3>
      <button class="btn-icon" id="btn-close-credit-cards" aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <p id="error-credit-card" class="alert-error" hidden></p>
    <div id="credit-cards-list" style="margin-bottom:1.25rem;"></div>
    <form id="form-credit-card" novalidate>
      <div class="form-grid">
        <div class="form-group">
          <label for="cc-name">Nombre de la tarjeta</label>
          <input id="cc-name" name="ccname" type="text" placeholder="Ej: Visa Gold" required />
        </div>
        <div class="form-group">
          <label for="cc-bank">Banco</label>
          <input id="cc-bank" name="ccbank" type="text" placeholder="Ej: Galicia" />
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" style="width:auto;padding:.65rem 1.5rem;">Agregar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: categorías -->
<div id="categories-modal" class="modal-overlay" hidden>
  <div class="modal-card">
    <div class="modal-header">
      <h3>Categorías</h3>
      <button class="btn-icon" id="btn-close-categories" aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <p id="error-category" class="alert-error" hidden></p>
    <div id="categories-list" style="margin-bottom:1.25rem;"></div>
    <form id="form-category" novalidate>
      <div class="form-grid">
        <div class="form-group">
          <label for="cat-name">Nombre</label>
          <input id="cat-name" name="catname" type="text" placeholder="Ej: Mascotas" required />
        </div>
        <div class="form-group">
          <label for="cat-color">Color</label>
          <input id="cat-color" name="catcolor" type="color" value="#6366f1" />
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" style="width:auto;padding:.65rem 1.5rem;">Agregar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: orígenes -->
<div id="origins-modal" class="modal-overlay" hidden>
  <div class="modal-card">
    <div class="modal-header">
      <h3>Orígenes de pago</h3>
      <button class="btn-icon" id="btn-close-origins" aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <p id="error-origin" class="alert-error" hidden></p>
    <div id="origins-list" style="margin-bottom:1.25rem;"></div>
    <form id="form-origin" novalidate>
      <div class="form-grid">
        <div class="form-group">
          <label for="orig-name">Nombre</label>
          <input id="orig-name" name="origname" type="text" placeholder="Ej: Billetera Virtual" required />
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" style="width:auto;padding:.65rem 1.5rem;">Agregar</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script type="module">
  import { initAuth, showAuth, showDashboard } from './js/auth.js';
  import { initDashboard } from './js/dashboard.js';
  import { initTheme } from './js/theme.js';

  initTheme();

  const storedUser = localStorage.getItem('user');

  if (storedUser && localStorage.getItem('token')) {
    showDashboard();
    initDashboard(JSON.parse(storedUser));
  } else {
    showAuth();
  }

  initAuth((user) => {
    showDashboard();
    initDashboard(user);
  });

  const now = new Date();
  document.getElementById('filter-month').value =
    `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
</script>
</body>
</html>
